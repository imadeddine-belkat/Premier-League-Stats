name: Update FPL Data

on:
  schedule:
    # Runs every Tuesday at 12:00 UTC (Adjust day/time to match your favorite GW update window)
    - cron: '0 12 * * 2'
  workflow_dispatch: # Allows you to manually trigger the script from the GitHub actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Note: Changed 'python-node-version' to the standard 'python-version'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run FPL Scrapers
      run: |
        python players_scrapper.py
        python teams_scrapper.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add .
        # Only commit if there are actual data updates to avoid workflow failures
        git diff-index --quiet HEAD || git commit -m "🤖 Auto-update FPL data for $(date +'%Y-%m-%d')"
        git push